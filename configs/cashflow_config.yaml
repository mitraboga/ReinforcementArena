environment_type: cashflow

environment:
  initial_cash: 5000.0
  initial_debt: 12000.0
  emergency_fund: 2000.0
  monthly_revenue: 8000.0
  revenue_std: 900.0
  operating_expenses: 4500.0
  expense_std: 400.0
  monthly_interest_rate: 0.015
  marketing_roi: 1.35
  savings_return: 0.003
  risk_cash_threshold: 2500.0
  risk_penalty: 750.0
  allocation_amount: 1000.0
  episode_length: 24
  actions: ["pay_debt", "invest_marketing", "save_cash", "hold_cash"]
  cash_bucket_size: 1000
  debt_bucket_size: 1000
  fund_bucket_size: 500
  seed: 21

agent:
  algorithm: q_learning
  alpha: 0.12
  gamma: 0.94
  epsilon: 0.25
  epsilon_decay: 0.998
  min_epsilon: 0.04
  seed: 22

training:
  episodes: 3000
  evaluation_episodes: 200
  checkpoint_path: artifacts/q_learning_cashflow.pkl

